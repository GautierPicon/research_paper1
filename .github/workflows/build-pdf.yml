name: Build PDF from LaTeX

on:
  push:
    paths:
      - "**.lex"
    branches:
      - main
      - master

jobs:
  build-and-push-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Detect changed .lex files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '\.lex$' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            ENCODED=$(echo "$CHANGED" | base64 -w 0)
            echo "files_b64=${ENCODED}" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Install LaTeX
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-french \
            latexmk

      - name: Compile .lex files to PDF
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set -e
          ERRORS=0
          while IFS= read -r LEX_FILE; do
            [ -z "$LEX_FILE" ] && continue
            BASE=$(basename "$LEX_FILE" .lex)
            cp "$LEX_FILE" "/tmp/${BASE}.tex"
            latexmk -pdf -interaction=nonstopmode -outdir=/tmp "/tmp/${BASE}.tex" || {
              tail -30 "/tmp/${BASE}.log" 2>/dev/null || true
              ERRORS=$((ERRORS + 1))
              continue
            }
            mv "/tmp/${BASE}.pdf" "${BASE}.pdf"
          done < <(echo "${{ steps.changed.outputs.files_b64 }}" | base64 -d)
          [ $ERRORS -eq 0 ] || exit 1

      - name: Commit PDF to main
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "*.pdf"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci: update PDF"
          git push origin HEAD:${{ github.ref_name }}

      - name: Prepare Pages artifact
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          mkdir _site
          cp *.pdf _site/
          echo "paper.mondomaine.com" > _site/CNAME
          PDF_NAME=$(ls _site/*.pdf | head -1 | xargs basename)
          cat > _site/index.html << EOF
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=./${PDF_NAME}"></head>
            <body></body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.changed.outputs.has_changes == 'true'
        id: deployment
        uses: actions/deploy-pages@v4