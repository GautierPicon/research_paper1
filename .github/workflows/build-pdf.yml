name: Build PDF from LaTeX

on:
  push:
    paths:
      - "**.lex"
    branches:
      - main
      - master

jobs:
  build-and-push-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Detect changed .lex files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '\.lex$' || true)
          RENAMED_FROM=$(git diff --name-status HEAD~1 HEAD | awk '/^R[0-9]*\t.*\.lex$/ {print $2}' || true)

          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            ENCODED=$(echo "$CHANGED" | base64 -w 0)
            echo "files_b64=${ENCODED}" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          if [ -n "$RENAMED_FROM" ]; then
            ENCODED_OLD=$(echo "$RENAMED_FROM" | base64 -w 0)
            echo "renamed_from_b64=${ENCODED_OLD}" >> $GITHUB_OUTPUT
          fi

      - name: Install LaTeX
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-french \
            latexmk

      - name: Compile .lex files to PDF
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set -e
          ERRORS=0
          while IFS= read -r LEX_FILE; do
            [ -z "$LEX_FILE" ] && continue
            BASE=$(basename "$LEX_FILE" .lex)
            cp "$LEX_FILE" "/tmp/${BASE}.tex"
            latexmk -pdf -interaction=nonstopmode -outdir=/tmp "/tmp/${BASE}.tex" || {
              tail -30 "/tmp/${BASE}.log" 2>/dev/null || true
              ERRORS=$((ERRORS + 1))
              continue
            }
            mv "/tmp/${BASE}.pdf" "${BASE}.pdf"
          done < <(echo "${{ steps.changed.outputs.files_b64 }}" | base64 -d)
          [ $ERRORS -eq 0 ] || exit 1

      - name: Commit PDF to main
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "*.pdf"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci: update PDF"
          git push origin HEAD:${{ github.ref_name }}

      - name: Remove renamed PDFs from gh-pages
        if: steps.changed.outputs.renamed_from_b64 != ''
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          while IFS= read -r OLD_LEX; do
            [ -z "$OLD_LEX" ] && continue
            OLD_BASE=$(basename "$OLD_LEX" .lex)
            rm -f "${OLD_BASE}.pdf"
          done < <(echo "${{ steps.changed.outputs.renamed_from_b64 }}" | base64 -d)
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci: remove renamed PDF"
          git push origin gh-pages
          git checkout ${{ github.ref_name }}

      - name: Deploy to gh-pages
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          rm -f *.pdf index.html

          cp *.pdf /tmp/ 2>/dev/null || true
          cp /tmp/*.pdf . 2>/dev/null || true

          PDF_NAME=$(basename "$(ls *.pdf | head -1)")
          cat > index.html << EOF
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=./${PDF_NAME}"></head>
            <body></body>
          </html>
          EOF

          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci: deploy PDF to gh-pages"
          git push origin gh-pages